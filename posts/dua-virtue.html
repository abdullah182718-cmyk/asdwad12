<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>فضل الدعاء | حصنك اليومي</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="azkar-page">
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-right"></i>
            الرئيسية
        </a>
        
        <div class="page-header">
            <h1><i class="fa-solid fa-hands-praying"></i> فضل الدعاء</h1>
            <div class="subhead">أحاديث في فضل الدعاء والتضرع</div>
        </div>

        <div id="azkarContainer"></div>
        
        <div class="footer-note">
            <i class="fa-regular fa-heart"></i>
            الدعاء هو العبادة
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script src="shared.js"></script>
    
    <script>
    (function() {
        'use strict';
        
        const pageSlug = 'dua-virtue';
        const pageCategory = 'فضل الدعاء';
        const STORAGE_KEY = 'dua-virtue_counts';
        
        const azkarData = [
            {
                text: "ادْعُوا اللَّهَ وَأَنْتُمْ مُوقِنُونَ بِالْإِجَابَةِ",
                note: "حديث نبوي شريف",
                maxCount: 1
            },
            {
                text: "لَيْسَ شَيْءٌ أَكْرَمَ عَلَى اللَّهِ مِنَ الدُّعَاءِ",
                note: "من أحاديث فضل الدعاء",
                maxCount: 1
            },
            {
                text: "إِذَا دَعَا أَحَدُكُمْ فَلْيُعَزِّرْ وَلْيُمَجِّدْ وَلْيُسَمِّعْ",
                note: "من آداب الدعاء",
                maxCount: 1
            },
            {
                text: "مَنْ لَمْ يَسْأَلِ اللَّهَ غَضِبَ عَلَيْهِ",
                note: "حديث نبوي",
                maxCount: 1
            },
            {
                text: "الدُّعَاءُ سِلَاحُ الْمُؤْمِنِ",
                note: "من أحاديث النبي ﷺ",
                maxCount: 1
            },
            {
                text: "إِنَّ الدُّعَاءَ لَيُكَرِّرُ الْقَدَرَ",
                note: "من فضائل الدعاء",
                maxCount: 1
            },
            {
                text: "لَا يَئُوسُ مِنْ رَحْمَةِ اللَّهِ إِلَّا الْقَوْمُ الْكَافِرُونَ",
                note: "سورة يوسف - آية 87",
                maxCount: 1
            },
            {
                text: "ادْعُوا رَبَّكُمْ تَضَرُّعًا وَخُفْيَةً",
                note: "سورة الأعراف - آية 55",
                maxCount: 1
            },
            {
                text: "وَقَالَ رَبُّكُمُ ادْعُونِي أَسْتَجِبْ لَكُمْ",
                note: "سورة غافر - آية 60",
                maxCount: 1
            },
            {
                text: "إِنَّ رَبَّكُمْ قَالَ ادْعُونِي فَاسْتَجِبْ لَكُمْ",
                note: "من فضل الدعاء",
                maxCount: 1
            }
        ];

        counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);

        function render() {
            if (!container) return;
            container.innerHTML = azkarData.map((item, idx) => {
                return AzkarApp.renderCard(item, idx, pageSlug);
            }).join('');
            AzkarApp.bindAzkarEvents(azkarData, pageSlug, pageCategory, incrementCount, resetCount);
        }

        function incrementCount(index) {
            AzkarApp.incrementCount(index, azkarData, STORAGE_KEY, render);
        }

        function resetCount(index) {
            AzkarApp.resetCount(index, STORAGE_KEY, render);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (counts.length !== azkarData.length) {
                counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);
            }
            render();
        });
    })();
    </script>
</body>
</html>
