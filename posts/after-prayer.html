<body>
    <div class="azkar-page">
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-right"></i>
            الرئيسية
        </a>
        
        <div class="page-header">
            <h1><i class="fa-solid fa-hand-holding-heart"></i> أذكار بعد الصلاة</h1>
            <div class="subhead">ما يقال عقب الصلوات المكتوبة</div>
        </div>

        <div id="azkarContainer"></div>
        
        <div class="footer-note">
            <i class="fa-regular fa-heart"></i>
            اللهم تقبل منا صلاتنا وذِكرنا، واجعلنا من الذاكرينك كثيراً
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script src="shared.js"></script>
    <script>
    (function() {
        'use strict';
        
        const pageSlug = 'after_prayer';
        const pageCategory = 'أذكار بعد الصلاة';
        const STORAGE_KEY = 'after_prayer_counts';
        
        const azkarData = [
            { text: "أَسْتَغْفِرُ اللهَ", note: "أستغفر الله العظيم", maxCount: 3 },
            { text: "اللَّهُمَّ أَنْتَ السَّلَامُ وَمِنْكَ السَّلَامُ، تَبَارَكْتَ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ", note: "بعد كل صلاة", maxCount: 1 },
            { text: "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرِ", note: "بعد كل صلاة - عشر مرات، أو مرة واحدة", maxCount: 10 },
            { text: "سُبْحَانَ اللهِ", note: "بعد كل صلاة - ثلاث وثلاثون مرة", maxCount: 33 },
            { text: "الْحَمْدُ لِلَّهِ", note: "بعد كل صلاة - ثلاث وثلاثون مرة", maxCount: 33 },
            { text: "اللَّهُ أَكْبَرُ", note: "بعد كل صلاة - أربع وثلاثون مرة", maxCount: 34 },
            { text: "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرِ", note: "مرة واحدة بعد التراويح", maxCount: 1 },
            { text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا، وَرِزْقًا طَيِّبًا، وَعَمَلًا مُتَقَبَّلًا", note: "ذكر مبارك", maxCount: 1 },
            { text: "سُبْحَانَ اللهِ وَبِحَمْدِهِ", note: "حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ", maxCount: 100 },
            { text: "لَا إِلَهَ إِلَّا اللهُ مُحَمَّدٌ رَسُولُ اللهِ", note: "من شهد أن لا إله إلا الله وأن محمداً رسول الله", maxCount: 1 }
        ];

        counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);

        function render() {
            if (!container) return;
            container.innerHTML = azkarData.map((item, idx) => AzkarApp.renderCard(item, idx, pageSlug)).join('');
            AzkarApp.bindAzkarEvents(azkarData, pageSlug, pageCategory, incrementCount, resetCount);
        }

        function incrementCount(index) {
            AzkarApp.incrementCount(index, azkarData, STORAGE_KEY, render);
        }

        function resetCount(index) {
            AzkarApp.resetCount(index, STORAGE_KEY, render);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (counts.length !== azkarData.length) {
                counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);
            }
            render();
        });
    })();
    </script>
</body>
</html>
