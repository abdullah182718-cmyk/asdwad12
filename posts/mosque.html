<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أذكار المسجد | حصنك اليومي</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="azkar-page">
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-right"></i>
            الرئيسية
        </a>
        
        <div class="page-header">
            <h1><i class="fa-solid fa-mosque"></i> أذكار المسجد</h1>
            <div class="subhead">أذكار دخول وخروج المسجد</div>
        </div>

        <div id="azkarContainer"></div>
        
        <div class="footer-note">
            <i class="fa-regular fa-heart"></i>
            اللهم اجعل مساجدنا بيوت الخير
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script src="shared.js"></script>
    
    <script>
    (function() {
        'use strict';
        
        const pageSlug = 'mosque';
        const pageCategory = 'أذكار المسجد';
        const STORAGE_KEY = 'mosque_counts';
        
        const azkarData = [
            {
                text: "بِسْمِ اللَّهِ وَبِرَكَةِ اللَّهِ، وَسَلَمَ عَلَيَّ أَهْلُهُ، فَإِنَّهُ لَهُ حَقٌّ أَنْ يَسْلَمَ",
                note: "عند دخول المسجد",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ وَعَذَابِ النَّارِ",
                note: "عند دخول المسجد",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ",
                note: "ذكر عند دخول المسجد",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا وَرِزْقًا طَيِّبًا وَعَمَلًا مُتَقَبَّلًا",
                note: "من الأدعية عند دخول المسجد",
                maxCount: 1
            },
            {
                text: "بِسْمِ اللَّهِ وَالسَّلَامُ عَلَى رَسُولِ اللَّهِ",
                note: "عند الخروج من المسجد",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ مِنْ فَضْلِكَ",
                note: "ذكر مبارك",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ لَا تَجْعَلْ لِي ذَنْبًا إِلَّا غَفَرْتَهُ",
                note: "من دعاء النبي ﷺ",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ اجْعَلْ أَعْمَالَنَا صَالِحَةً وَاجْعَلْهَا لِوَجْهِكَ الْكَرِيمِ",
                note: "ذكر طيب",
                maxCount: 1
            },
            {
                text: "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرِ",
                note: "من أذكار المسجد",
                maxCount: 100
            },
            {
                text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",
                note: "ذكر مبارك",
                maxCount: 100
            }
        ];

        counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);

        function render() {
            if (!container) return;
            container.innerHTML = azkarData.map((item, idx) => {
                return AzkarApp.renderCard(item, idx, pageSlug);
            }).join('');
            AzkarApp.bindAzkarEvents(azkarData, pageSlug, pageCategory, incrementCount, resetCount);
        }

        function incrementCount(index) {
            AzkarApp.incrementCount(index, azkarData, STORAGE_KEY, render);
        }

        function resetCount(index) {
            AzkarApp.resetCount(index, STORAGE_KEY, render);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (counts.length !== azkarData.length) {
                counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);
            }
            render();
        });
    })();
    </script>
</body>
</html>
