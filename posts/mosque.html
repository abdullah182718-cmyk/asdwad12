<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أذكار المسجد | حصنك اليومي</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="azkar-page">
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-right"></i>
            الرئيسية
        </a>
        
        <div class="page-header">
            <h1><i class="fa-solid fa-mosque"></i> أذكار المسجد</h1>
            <div class="subhead">أذكار دخول وخروج المسجد</div>
        </div>

        <div id="azkarContainer"></div>
        
        <div class="footer-note">
            <i class="fa-regular fa-heart"></i>
            اللهم اجعل مساجدنا بيوت الخير
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script src="shared.js"></script>
    
    <script>
    (function() {
        'use strict';
        
        const pageSlug = 'mosque';
        const pageCategory = 'أذكار المسجد';
        const STORAGE_KEY = 'mosque_counts';
        
        const azkarData = [
            {
                text: "اللّهُـمَّ اجْعَـلْ في قَلْبـي نورا ، وَفي لِسـاني نورا، وَاجْعَـلْ في سَمْعي نورا، وَاجْعَـلْ في بَصَري نورا، وَاجْعَـلْ مِنْ خَلْفي نورا، وَمِنْ أَمامـي نورا، وَاجْعَـلْ مِنْ فَوْقـي نورا ، وَمِن تَحْتـي نورا .اللّهُـمَّ أَعْطِنـي نورا",
                note: "دعاء الذهاب إلى المسجد",
                maxCount: 1
            },
            {
                text: "أَعوذُ باللهِ العَظيـم وَبِوَجْهِـهِ الكَرِيـم وَسُلْطـانِه القَديـم مِنَ الشّيْـطانِ الرَّجـيم، بِسْمِ اللَّهِ، وَالصَّلاةُ وَالسَّلامُ عَلَى رَسُولِ الله\nاللّهُـمَّ افْتَـحْ لي أَبْوابَ رَحْمَتـِك",
                note: "دعاء دخول المسجد - يبدء برجله اليمنى",
                maxCount: 1
            },
            {
                text: "بِسْـمِ اللَّـهِ وَالصَّلاةُ وَالسَّلامُ عَلَى رَسُولِ اللَّهِ\nاللَّهُمَّ إنِّي أَسْأَلُكَ مِنْ فَضْلِكَ\nاللَّهُمَّ اعْصِمْنِي مِنَ الشَّيْطَانِ الرَّجِيم",
                note: "دعاء الخروج من المسجد - يبدء برجله اليسرى",
                maxCount: 1
            }
        ];

        counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);

        function render() {
            if (!container) return;
            container.innerHTML = azkarData.map((item, idx) => {
                return AzkarApp.renderCard(item, idx, pageSlug);
            }).join('');
            AzkarApp.bindAzkarEvents(azkarData, pageSlug, pageCategory, incrementCount, resetCount);
        }

        function incrementCount(index) {
            AzkarApp.incrementCount(index, azkarData, STORAGE_KEY, render);
        }

        function resetCount(index) {
            AzkarApp.resetCount(index, STORAGE_KEY, render);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (counts.length !== azkarData.length) {
                counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);
            }
            render();
        });
    })();
    </script>
</body>
</html>
