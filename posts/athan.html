<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أذكار الأذان | حصنك اليومي</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="azkar-page">
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-right"></i>
            الرئيسية
        </a>
        
        <div class="page-header">
            <h1><i class="fa-solid fa-volume-high"></i> أذكار الأذان</h1>
            <div class="subhead">ما يقال عند سماع الأذان</div>
        </div>

        <div id="azkarContainer"></div>
        
        <div class="footer-note">
            <i class="fa-regular fa-heart"></i>
            من听到了 الأذان وبقى في مكانه كان له كذا وكذا
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script src="shared.js"></script>
    
    <script>
    (function() {
        'use strict';
        
        const pageSlug = 'athan';
        const pageCategory = 'أذكار الأذان';
        const STORAGE_KEY = 'athan_counts';
        
        const azkarData = [
            {
                text: "مُسَوَّمَةً عِنْدَ رَبِّكَ عَلَىٰ ذَلِكَ لَكَ وَلِمَنْ خَرَجَ مِن بَيْتِهِ لِيُؤَذِّنَ فِي الْأَرْضِ",
                note: "من قال عند سماع الأذان: اللهم صل على محمد",
                maxCount: 1
            },
            {
                text: "أَشْهَدُ أَن لَّا إِلَٰهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ",
                note: "تقولها بعد الأذان مباشرة",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ رَبَّ هَٰذِهِ الدَّعْوَةِ التَّامَّةِ وَالصَّلَاةِ الْقَائِمَةِ آتِ مُحَمَّدًا الْوَسِيلَةَ وَالْفَضِيلَةَ وَابْعَثْهُ مَقَامًا مَّحْمُودًا الَّذِي وَعَدْتَهُ",
                note: "من أدعية الأذان",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ بِحَقِّ سَعِيدِ الْمُسَمَّعِينَ إِلَّا فَرَّجْتَ عَنِّي",
                note: "ذكر عند سماع الأذان",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ إِنَّ هَٰذِهِ نِّدَاءُ الْحَقِّ وَدَعْوَةُ الْإِسْلَامِ فَأَعِنِّي عَلَى طَاعَتِكَ",
                note: "ذكر مبارك",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْهُدَى وَالتُّقَى وَالْعَفَافَ وَالْغِنَى",
                note: "من الأدعية عند سماع الأذان",
                maxCount: 1
            },
            {
                text: "لَا إِلَهَ إِلَّا اللَّهُ",
                note: "من ذكر عند الأذان",
                maxCount: 33
            },
            {
                text: "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ",
                note: "من صلى على النبي ﷺ عند سماع الأذان",
                maxCount: 10
            },
            {
                text: "اللَّهُمَّ إِنِّي أَسْتَغْفِرُكَ وَأَتُوبُ إِلَيْكَ",
                note: "ذكر طيب",
                maxCount: 100
            },
            {
                text: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ",
                note: "من دعاء النبي ﷺ عند سماع الأذان",
                maxCount: 1
            }
        ];

        counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);

        function render() {
            if (!container) return;
            container.innerHTML = azkarData.map((item, idx) => {
                return AzkarApp.renderCard(item, idx, pageSlug);
            }).join('');
            AzkarApp.bindAzkarEvents(azkarData, pageSlug, pageCategory, incrementCount, resetCount);
        }

        function incrementCount(index) {
            AzkarApp.incrementCount(index, azkarData, STORAGE_KEY, render);
        }

        function resetCount(index) {
            AzkarApp.resetCount(index, STORAGE_KEY, render);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (counts.length !== azkarData.length) {
                counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);
            }
            render();
        });
    })();
    </script>
</body>
</html>
