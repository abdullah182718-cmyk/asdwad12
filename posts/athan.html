<body>
    <div class="azkar-page">
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-right"></i>
            الرئيسية

        <div class="page-header">
            <h1><i class="fa-solid fa-volume-high"></i> أذكار الأذان</h1>
            <div class="subhead">ما يقال عند سماع الأذان</div>
        </div>

        <div id="azkarContainer"></div>
        
        <div class="footer-note">
            <i class="fa-regular fa-heart"></i>
            من听到了 الأذان وبقى في مكانه كان له كذا وكذا
        </div>

    <div id="toastMsg" class="toast-msg"></div>

    <script src="shared.js"></script>
    
    <script>
    (function() {
        'use strict';
        
        const pageSlug = 'athan';
        const pageCategory = 'أذكار الأذان';
        const STORAGE_KEY = 'athan_counts';
        
        const azkarData = [
            {
                text: "يَقُولُ مِثْلَ مَا يَقُولُ الـمُؤَذِّنُ إلاَّ فِي \"حَيَّ عَلَى الصَّلاةِ وَحَيَّ عَلَى الفَلاَحِ\" فَيَقُولُ: \"لاَ حَوْلَ وَلا قُوَّةَ إلاَّ باللَّهِ\"",
                note: "ما يقال عند سماع الأذان",
                maxCount: 1
            },
            {
                text: "أَشْهَد أَنْ لا إِله إِلاَّ اللَّه وحْدهُ لا شَريك لهُ ، وَأَنَّ مُحمَّداً عبْدُهُ وَرسُولُهُ ، رضِيتُ بِاللَّهِ ربًّا ، وبمُحَمَّدٍ رَسُولاً ، وبالإِسْلامِ دِينًا",
                note: "رواه مسلم عن سعد بن أبي وقاص",
                maxCount: 1
            },
            {
                text: "إِذا سمِعْتُمُ النِّداءَ فَقُولُوا مِثْلَ ما يَقُولُ ، ثُمَّ صَلُّوا علَيَّ ، فَإِنَّهُ مَنْ صَلَّى علَيَّ صَلاةً صَلَّى اللَّه عَلَيْهِ بِهَا عشْراً ، ثُمَّ سلُوا اللَّه لي الْوسِيلَةَ",
                note: "رواه مسلم عن عبد الله بن عمرو بن العاص",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ رَبَّ هذِهِ الدَّعوةِ التَّامَّةِ ، والصَّلاةِ الْقَائِمةِ، آت مُحَمَّداً الْوسِيلَةَ ، والْفَضَيِلَة، وابْعثْهُ مقَامًا محْمُوداً الَّذي وعَدْتَه",
                note: "رواه البخاري عن جابر بن عبد الله",
                maxCount: 1
            },
            {
                text: "اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ\nاللَّهُمَّ رَبَّ هَذِهِ الدَّعْوَةِ التَّامَّةِ، والصَّلاةِ القَائِمَةِ، آتِ مُـحَمَّداً الوَسِيْلَةَ والفَضِيْلَةَ، وابْعَثْهُ مَقَاماً مَـحْمُوداً الَّذِي وَعَدْتَهُ",
                note: "ما يقال بعد سماع الأذان",
                maxCount: 1
            },
            {
                text: "الدُّعَاءُ لَا يُرَدُّ بَيْنَ الْأَذَانِ وَالْإِقَامَةِ",
                note: "رواه البخاري ومسلم - ما يقال بين الأذان والإقامة",
                maxCount: 1
            },
            {
                text: "اللهُ أكْبَرُ ، اللهُ أكْبَرُ\nاللهُ أكْبَرُ ، اللهُ أكْبَرُ\nأشْهَدُ أنَّ لا إلَهَ إلاَّ اللهُ\nأشْهَدُ أنَّ لا إلَهَ إلاَّ اللهُ\nأشْهَدُ أنَّ مُحَمَّداً رَسُولُ اللهِ\nأشْهَدُ أنَّ مُحَمَّداً رَسُولُ اللهِ\nحَيَّ عَلَى الصَّلاةِ\nحَيَّ عَلَى الفَلاحِ\nاللهُ أكْبَرُ ، اللهُ أكْبَرُ\nلاَ إلَهَ إلاَّ اللهُ",
                note: "نص صيغة الأذان",
                maxCount: 1
            },
            {
                text: "اللهُ أكْبَرُ ، اللهُ أكْبَرُ\nاللهُ أكْبَرُ ، اللهُ أكْبَرُ\nأشْهَدُ أنَّ لا إلَهَ إلاَّ اللهُ\nأشْهَدُ أنَّ لا إلَهَ إلاَّ اللهُ\nأشْهَدُ أنَّ مُحَمَّداً رَسُولُ اللهِ\nأشْهَدُ أنَّ مُحَمَّداً رَسُولُ اللهِ\nحَيَّ عَلَى الصَّلاةِ\nحَيَّ عَلَى الفَلاحِ\nالصلاةُ خيرٌ مِنَ النوم\nالصلاةُ خيرٌ من النوم\nاللهُ أكْبَرُ ، اللهُ أكْبَرُ\nلاَ إلَهَ إلاَّ اللهُ",
                note: "نص صيغة أذان الفجر",
                maxCount: 1
            },
            {
                text: "اللهُ أكْبَرُ ، اللهُ أكْبَرُ\nأشْهَدُ أنَّ لا إلَهَ إلاَّ اللهُ\nأشْهَدُ أنَّ مُحَمَّداً رَسُولُ اللهِ\nحَيَّ عَلَى الصَّلاةِ\nحَيَّ عَلَى الفَلاحِ\nقد قامت الصلاةُ\nقد قامت الصلاةُ\nاللهُ أكْبَرُ ، اللهُ أكْبَرُ\nلاَ إلَهَ إلاَّ اللهُ",
                note: "نص صيغة الإقامة",
                maxCount: 1
            }
        ];

        counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);

        function render() {
            if (!container) return;
            container.innerHTML = azkarData.map((item, idx) => {
                return AzkarApp.renderCard(item, idx, pageSlug);
            }).join('');
            AzkarApp.bindAzkarEvents(azkarData, pageSlug, pageCategory, incrementCount, resetCount);
        }

        function incrementCount(index) {
            AzkarApp.incrementCount(index, azkarData, STORAGE_KEY, render);
        }

        function resetCount(index) {
            AzkarApp.resetCount(index, STORAGE_KEY, render);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (counts.length !== azkarData.length) {
                counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);
            }
            render();
        });
    })();
    </script>
</body>
</html>
