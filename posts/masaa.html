<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أذكار المساء | حصنك اليومي</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="azkar-page">
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-right"></i>
            الرئيسية
        </a>
        
        <div class="page-header">
            <h1><i class="fa-solid fa-cloud-moon"></i> أذكار المساء</h1>
            <div class="subhead">أذكار المساء تقال بعد العصر</div>
        </div>

        <div id="azkarContainer"></div>
        
        <div class="footer-note">
            <i class="fa-regular fa-heart"></i>
            اللهم اجعلنا من الذاكرين الله كثيراً والذاكرات
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script src="shared.js"></script>
    <script>
    (function() {
        'use strict';
        
        const pageSlug = 'masaa';
        const pageCategory = 'أذكار المساء';
        const STORAGE_KEY = 'masaa_counts';
        
        const azkarData = [
            {
                title: "آية الكرسي",
                text: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَؤُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ",
                note: "من قالها حين يمسي أجير من الجن حتى يصبح",
                maxCount: 1
            },
            {
                text: "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ قُلْ هُوَ اللَّهُ أَحَدٌ  ⚬  اللَّهُ الصَّمَدُ  ⚬  لَمْ يَلِدْ وَلَمْ يُولَدْ  ⚬  وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ",
                note: "من قالها ثلاث مرات حين يصبح وحين يمسي كانت له عدل عشر رقاب",
                maxCount: 3
            },
            {
                text: "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ  ⚬  مِن شَرِّ مَا خَلَقَ  ⚬  وَمِن شَرِّ غَرْقٍ فِي النَّارِ  ⚬  وَمِن شَرِّ الْغُرْبِ فِي الْبَرِّ  ⚬  وَمِن شَرِّ الْغِيبَةِ فِي الْبُطُونِ  ⚬  وَمِن شَرِّ الْحَاسِدِ إِذَا حَسَدَ",
                note: "من قالها حين يمسي ثلاث مرات لم يضره شيء",
                maxCount: 3
            },
            {
                text: "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ قُلْ أَعُوذُ بِرَبِّ النَّاسِ  ⚬  مَلِكِ النَّاسِ  ⚬  إِلَٰهِ النَّاسِ  ⚬  مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ  ⚬  الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ  ⚬  مِنَ الْجِنَّةِ وَالنَّاسِ",
                note: "من قالها ثلاث مرات حين يمسي لم يضره شيء",
                maxCount: 3
            },
            {
                text: "اللَّهُمَّ بِكَ اللَّهُمَّ بِسْمِكَ أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ",
                note: "ذكر طيب",
                maxCount: 1
            },
            {
                text: "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ أَصْلِحْ لِي شَأْنِي كُلَّهُ وَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ",
                note: "ذكر عظيم",
                maxCount: 1
            },
            {
                text: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ",
                note: "لم تضره حمة في تلك الليلة",
                maxCount: 3
            },
            {
                text: "اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى نَبِيِّنَا مُحَمَّد",
                note: "من صلى على النبي حين يصبح وحين يمسي أدركته شفاعتي يوم القيامة",
                maxCount: 10
            },
            {
                text: "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرِ",
                note: "كانت له عدل عشر رقاب، وكتبت له مئة حسنة، ومحيت عنه مئة سيئة، وكانت له حرزا من الشيطان",
                maxCount: 100
            },
            {
                text: "سُبْحَانَ اللهِ وَبِحَمْدِهِ",
                note: "حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ",
                maxCount: 100
            },
            {
                text: "أَسْتَغْفِرُ اللهَ وَأَتُوبُ إِلَيْهِ",
                note: "مائة حسنة، ومُحيت عنه مائة سيئة، وكانت له حرزاً من الشيطان حتى يصبح",
                maxCount: 100
            }
        ];

        counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);

        function render() {
            if (!container) return;
            container.innerHTML = azkarData.map((item, idx) => AzkarApp.renderCard(item, idx, pageSlug)).join('');
            AzkarApp.bindAzkarEvents(azkarData, pageSlug, pageCategory, incrementCount, resetCount);
        }

        function incrementCount(index) {
            AzkarApp.incrementCount(index, azkarData, STORAGE_KEY, render);
        }

        function resetCount(index) {
            AzkarApp.resetCount(index, STORAGE_KEY, render);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (counts.length !== azkarData.length) {
                counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);
            }
            render();
        });
    })();
    </script>
</body>
</html>
