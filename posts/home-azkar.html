<body>
    <div class="azkar-page">
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-right"></i>
            الرئيسية
        </a>
        
        <div class="page-header">
            <h1><i class="fa-solid fa-house"></i> أذكار المنزل</h1>
            <div class="subhead">أذكار الدخول والخروج من المنزل</div>
        </div>

        <div id="azkarContainer"></div>
        
        <div class="footer-note">
            <i class="fa-regular fa-heart"></i>
            اللهم اجعل بيوتنا مباركة
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script src="shared.js"></script>
    
    <script>
    (function() {
        'use strict';
        
        const pageSlug = 'home-azkar';
        const pageCategory = 'أذكار المنزل';
        const STORAGE_KEY = 'home-azkar_counts';
        
        const azkarData = [
            {
                text: "بِسْـمِ اللهِ وَلَجْنـا، وَبِسْـمِ اللهِ خَـرَجْنـا، وَعَلـى رَبِّنـا تَوَكّلْـنا",
                note: "أذكار الدخول إلى المنزل",
                maxCount: 1
            },
            {
                text: "بِسْمِ اللهِ ، تَوَكَّلْـتُ عَلى اللهِ وَلا حَوْلَ وَلا قُـوَّةَ إِلاّ بِالله\nاللّهُـمَّ إِنِّـي أَعـوذُ بِكَ أَنْ أَضِـلَّ أَوْ أُضَـل ، أَوْ أَزِلَّ أَوْ أُزَل ، أَوْ أَظْلِـمَ أَوْ أَُظْلَـم ، أَوْ أَجْهَلَ أَوْ يُـجْهَلَ عَلَـيّ",
                note: "أذكار الخروج من المنزل",
                maxCount: 1
            }
        ];

        counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);

        function render() {
            if (!container) return;
            container.innerHTML = azkarData.map((item, idx) => {
                return AzkarApp.renderCard(item, idx, pageSlug);
            }).join('');
            AzkarApp.bindAzkarEvents(azkarData, pageSlug, pageCategory, incrementCount, resetCount);
        }

        function incrementCount(index) {
            AzkarApp.incrementCount(index, azkarData, STORAGE_KEY, render);
        }

        function resetCount(index) {
            AzkarApp.resetCount(index, STORAGE_KEY, render);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (counts.length !== azkarData.length) {
                counts = AzkarApp.loadCounts(STORAGE_KEY, azkarData.length);
            }
            render();
        });
    })();
    </script>
</body>
